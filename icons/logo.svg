<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="HeyGen Audio URL Extractor logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="sheen" x1="256" y1="0" x2="256" y2="282" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Squircle background -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>
  <rect width="512" height="282" rx="120" fill="url(#sheen)"/>

  <!-- Audio waveform / equalizer bars (white), symmetric around the midline -->
  <g fill="#FFFFFF">
    <rect x="105" y="211" width="33" height="90"  rx="16.5" opacity="0.92"/>
    <rect x="158" y="173" width="33" height="166" rx="16.5"/>
    <rect x="211" y="133" width="33" height="246" rx="16.5"/>
    <rect x="264" y="190" width="33" height="132" rx="16.5" opacity="0.86"/>
    <rect x="317" y="123" width="33" height="266" rx="16.5"/>
    <rect x="370" y="197" width="33" height="118" rx="16.5" opacity="0.86"/>
    <rect x="423" y="158" width="33" height="196" rx="16.5" opacity="0.96"/>
  </g>
</svg>
