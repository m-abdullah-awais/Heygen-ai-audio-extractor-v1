<!DOCTYPE html>
<!--
  HeyGen Audio URL Extractor
  Author : Muhammad Abdullah Awais, Full Stack Developer
  Website: https://www.abdullahawais.com
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HeyGen Audio URL Extractor</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <img class="header__logo" src="../../icons/icon128.png" alt="" width="36" height="36" />
      <div class="header__text">
        <h1 class="title">Audio URL Extractor</h1>
        <p class="subtitle">HeyGen</p>
      </div>
    </header>

    <!-- Status banner: shows "not supported", result counts, and errors. -->
    <div id="banner" class="banner banner--info" role="status" aria-live="polite"></div>

    <div class="toolbar">
      <button id="fetchBtn" class="btn btn--primary" type="button">
        <span class="btn__icon" aria-hidden="true">&#x21bb;</span>
        Fetch Audio
      </button>
      <button id="copyAllBtn" class="btn btn--ghost" type="button" hidden>Copy All</button>
    </div>

    <!-- Results table. The <tbody> rows are injected by popup.js. -->
    <div class="results-wrap">
      <table class="results-table" aria-label="Extracted audio URLs">
        <thead>
          <tr>
            <th class="col-idx" scope="col">#</th>
            <th class="col-url" scope="col">Audio URL</th>
            <th class="col-actions" scope="col">Actions</th>
          </tr>
        </thead>
        <tbody id="results">
          <!-- Idle / empty / result rows injected here -->
        </tbody>
      </table>
    </div>

    <!-- White-label footer / author credit. -->
    <footer class="footer">
      <span class="footer__by">Built by <strong>Muhammad Abdullah Awais</strong></span>
      <span class="footer__role">Full Stack Developer</span>
      <a class="footer__link" href="https://www.abdullahawais.com" target="_blank" rel="noopener noreferrer">
        www.abdullahawais.com
      </a>
    </footer>

    <script type="module" src="popup.js"></script>
  </body>
</html>
